<div class="p-6 rounded-2xl border 
    {% if variant == 'info' %} bg-sky-50 border-sky-100 text-sky-700 
    {% elif variant == 'warning' %} bg-amber-50 border-amber-100 text-amber-700
    {% elif variant == 'danger' %} bg-red-50 border-red-100 text-red-700
    {% else %} bg-slate-50 border-slate-100 text-slate-700 {% endif %} 
    {{ class }}">
    
    <div class="flex items-center gap-3 mb-2">
        {% if icon %}
            <div class="w-5 h-5">
                {{ icon|safe }}
            </div>
        {% else %}
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        {% endif %}
        <span class="font-bold text-sm">{{ title|default:"Informasi" }}</span>
    </div>
    
    <p class="text-xs leading-relaxed {% if variant == 'info' %} text-sky-600 {% elif variant == 'warning' %} text-amber-600 {% elif variant == 'danger' %} text-red-600 {% else %} text-slate-600 {% endif %}">
        {{ message }}
    </p>
</div>
