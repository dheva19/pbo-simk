<div class="mb-4">
    {% if label %}
        <label class="block text-sm font-medium text-slate-700 mb-1.5">{{ label }}</label>
    {% endif %}
    <textarea 
        name="{{ name }}"
        rows="{{ rows|default:3 }}"
        placeholder="{{ placeholder }}"
        {% if required %}required{% endif %}
        class="w-full px-3 py-2.5 
               border border-slate-200 rounded-xl text-sm text-slate-800
               bg-slate-50 focus:bg-white focus:outline-none 
               focus:ring-2 focus:ring-sky-300 focus:border-sky-400 
               transition duration-200 placeholder:text-slate-400
               {{ class }}"
    >{{ value|default:'' }}</textarea>
    {% if help_text %}
        <p class="mt-1 text-xs text-slate-400">{{ help_text }}</p>
    {% endif %}
    {% if error %}
        <p class="mt-1 text-xs text-red-500 flex items-center gap-1">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            {{ error }}
        </p>
    {% endif %}
</div>
